<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xác nhận cấp lại mật khẩu</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f7f8;
            --panel: #ffffff;
            --text: #102a2f;
            --muted: #5b6b70;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --danger: #b42318;
            --border: #d8e2e5;
            --shadow: 0 18px 45px rgba(16, 42, 47, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 30%),
                radial-gradient(circle at top right, rgba(17, 94, 89, 0.08), transparent 24%),
                var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(760px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .hero {
            padding: 28px 30px 18px;
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.12), rgba(255, 255, 255, 0));
            border-bottom: 1px solid var(--border);
        }

        .eyebrow {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.12);
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(26px, 3vw, 36px);
            line-height: 1.1;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.6;
            max-width: 58ch;
        }

        .content {
            padding: 28px 30px 30px;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 18px;
        }

        button {
            appearance: none;
            border: 0;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .primary {
            background: var(--accent);
            color: white;
            min-width: 210px;
        }

        .secondary {
            background: #e7eff0;
            color: var(--text);
        }

        .status {
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #f8fbfb;
            color: var(--muted);
            min-height: 56px;
            white-space: pre-wrap;
        }

        .status.ok {
            border-color: rgba(15, 118, 110, 0.28);
            color: var(--accent-strong);
            background: rgba(15, 118, 110, 0.08);
        }

        .status.error {
            border-color: rgba(180, 35, 24, 0.3);
            color: var(--danger);
            background: rgba(180, 35, 24, 0.07);
        }

        .hint {
            margin-top: 14px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        code {
            background: #edf3f4;
            border-radius: 8px;
            padding: 2px 6px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 0.95em;
        }
    </style>
</head>

<body>
    <main class="card">
        <section class="hero">
            <span class="eyebrow">Password Reset Approval</span>
            <h1>Xác nhận cấp lại mật khẩu</h1>
            <p class="subtitle">
                Trang này chỉ thực hiện approve khi bạn đã đăng nhập bằng tài khoản admin trong trình duyệt hiện tại.
                Nếu chưa đăng nhập, hãy đăng nhập trước rồi quay lại trang này.
            </p>
        </section>

        <section class="content">
            <div class="actions">
                <button class="primary" id="approveBtn">Approve ngay</button>
                <button class="secondary" id="retryBtn">Thử lại</button>
            </div>

            <div class="status" id="statusBox">Đang kiểm tra trạng thái đăng nhập...</div>

        </section>
    </main>

    <script>
        const apiBase = `${window.location.origin}/api/v1`;
        const approveEndpoint = `${apiBase}/auth/forgot-password/approve`;

        const statusBox = document.getElementById('statusBox');
        const approveBtn = document.getElementById('approveBtn');
        const retryBtn = document.getElementById('retryBtn');

        const params = new URLSearchParams(window.location.search);
        const requestId = params.get('requestId') || '';
        const approvalToken = params.get('approvalToken') || '';

        function setStatus(message, type = '') {
            statusBox.className = `status ${type}`.trim();
            statusBox.textContent = message;
        }

        function getAdminToken() {
            const keys = ['accessToken', 'token', 'authToken', 'jwt'];
            for (const key of keys) {
                const value = window.localStorage.getItem(key) || window.sessionStorage.getItem(key);
                if (value) {
                    return value.startsWith('Bearer ') ? value.slice(7) : value;
                }
            }
            return null;
        }

        async function approveReset() {
            const token = getAdminToken();
            if (!requestId || !approvalToken) {
                setStatus('Link xác nhận không hợp lệ. Thiếu requestId hoặc approvalToken.', 'error');
                return;
            }

            if (!token) {
                setStatus('Chưa phát hiện token admin trong trình duyệt. Hãy đăng nhập bằng tài khoản admin rồi bấm thử lại.', 'error');
                return;
            }

            approveBtn.disabled = true;
            retryBtn.disabled = true;
            setStatus('Đang gửi yêu cầu approve bằng token admin...');

            try {
                const response = await fetch(`${approveEndpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ requestId, approvalToken })
                });

                const payload = await response.json();
                if (!response.ok) {
                    const message = payload?.message || 'Approve thất bại';
                    throw new Error(message);
                }

                setStatus(`Đã approve thành công. Mật khẩu mới đã được gửi tới email nhân viên.\nTrạng thái: ${payload?.data?.status || 'APPROVED'}`, 'ok');
            } catch (error) {
                setStatus(error.message || 'Không thể approve yêu cầu này.', 'error');
            } finally {
                approveBtn.disabled = false;
                retryBtn.disabled = false;
            }
        }

        approveBtn.addEventListener('click', approveReset);
        retryBtn.addEventListener('click', approveReset);

        window.addEventListener('load', () => {
            const token = getAdminToken();
            if (token) {
                approveReset();
            } else {
                setStatus('Đã mở trang xác nhận. Nếu bạn đã đăng nhập admin trước đó, hệ thống sẽ dùng token trong trình duyệt khi bấm Approve ngay.', '');
            }
        });
    </script>
</body>

</html>
